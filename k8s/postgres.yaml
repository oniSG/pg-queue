apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_USER
              value: pgqueue
            - name: POSTGRES_PASSWORD
              value: pgqueue
            - name: POSTGRES_DB
              value: pgqueue
          ports:
            - containerPort: 5432
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "pgqueue", "-d", "pgqueue"]
            initialDelaySeconds: 2
            periodSeconds: 2
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "pgqueue", "-d", "pgqueue"]
            initialDelaySeconds: 15
            periodSeconds: 10
